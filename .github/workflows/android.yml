name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore plc-release.keystore -alias plc -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=DoubleCNC, OU=PLC, O=DoubleCNC, L=City, ST=State, C=CN"

    - name: Build Release APK
      run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/plc-release.keystore -Pandroid.injected.signing.store.password=123456 -Pandroid.injected.signing.key.alias=plc -Pandroid.injected.signing.key.password=123456

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
