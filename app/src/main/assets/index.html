<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLC 授权码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4fc3f7;
        }

        .header p {
            font-size: 14px;
            color: #aaa;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
        }

        .tab:hover:not(.active) {
            color: #fff;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #b0bec5;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group .hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
        }

        .file-key-display {
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 8px;
            display: none;
        }

        .file-key-display.show {
            display: block;
        }

        .file-key-display .label {
            font-size: 12px;
            color: #4fc3f7;
        }

        .file-key-display .value {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 4px;
        }

        .remark-group {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        .remark-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #b0bec5;
        }

        .remark-group textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            resize: none;
            height: 60px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .remark-group textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }

        .remark-group textarea::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 195, 247, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
        }

        .result.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #a5d6a7;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-item .label {
            font-size: 14px;
            color: #a5d6a7;
        }

        .result-item .value {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .key-display {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            text-align: center;
        }

        .key-display .key {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .key-display .copy-btn {
            margin-top: 12px;
            padding: 10px 24px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .key-display .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .key-display .copy-btn.copied {
            background: #4caf50;
        }

        .details-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-section h3 {
            font-size: 14px;
            color: #a5d6a7;
            margin-bottom: 12px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            border-radius: 8px;
        }

        .detail-item .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 13px;
            color: #fff;
        }

        .remark-display {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 13px;
            color: #b0bec5;
        }

        .warning-box {
            margin-top: 16px;
            padding: 12px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 8px;
            font-size: 13px;
            color: #ffcc80;
        }

        .error {
            display: none;
            background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .error.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .error p {
            font-size: 14px;
            color: #ffcdd2;
        }

        /* 历史页面样式 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-header h2 {
            font-size: 18px;
            color: #4fc3f7;
        }

        .clear-btn {
            padding: 8px 16px;
            font-size: 13px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            color: #f44336;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .history-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .history-item:hover {
            border-color: rgba(79, 195, 247, 0.3);
        }

        .history-item .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .history-item .key-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #4fc3f7;
            letter-spacing: 1px;
            flex: 1;
            word-break: break-all;
        }

        .history-item .key-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .history-item .copy-mini-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item .copy-mini-btn:hover {
            background: rgba(79, 195, 247, 0.3);
        }

        .history-item .delete-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(244, 67, 54, 0.2);
            border: none;
            border-radius: 6px;
            color: #f44336;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item .delete-btn:hover {
            background: rgba(244, 67, 54, 0.4);
        }

        .history-item .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .history-item .info-item {
            text-align: center;
        }

        .history-item .info-item .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .history-item .info-item .value {
            font-size: 13px;
            color: #fff;
        }

        .history-item .remark-text {
            font-size: 12px;
            color: #888;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .footer p {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PLC 授权码生成器</h1>
            <p>根据申请码生成单次使用授权密钥</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="generator">生成授权码</div>
            <div class="tab" data-tab="history">历史记录</div>
        </div>

        <!-- 生成页面 -->
        <div class="page active" id="generatorPage">
            <div class="card">
                <div class="form-group">
                    <label for="requestKey">申请码</label>
                    <div class="input-wrapper">
                        <input type="text" id="requestKey" placeholder="输入申请码（如：ABCD-EFGH-IJ）" autocomplete="off" style="text-transform: uppercase;">
                    </div>
                    <p class="hint">由 PRO 程序生成，包含加密的文件标识和校验哈希</p>
                    <div class="file-key-display" id="fileKeyDisplay">
                        <div class="label">解析到的文件标识</div>
                        <div class="value" id="parsedFileKey">-</div>
                        <div class="label" style="margin-top: 8px;">校验哈希</div>
                        <div class="value" id="parsedRequestHash">-</div>
                    </div>
                </div>

                <div class="remark-group">
                    <label for="remark">备注（可选）</label>
                    <textarea id="remark" placeholder="输入备注信息。"></textarea>
                </div>

                <button class="btn btn-primary" onclick="generateKey()">生成授权码</button>
            </div>

            <div class="result" id="result">
                <h2>✓ 生成成功</h2>
                <div class="result-item">
                    <span class="label">文件 Key</span>
                    <span class="value" id="resultFileKey">-</span>
                </div>
                <div class="result-item">
                    <span class="label">校验哈希</span>
                    <span class="value" id="resultRequestHash">-</span>
                </div>
                <div class="key-display">
                    <div class="key" id="resultKey">-</div>
                    <button class="copy-btn" onclick="copyKey()">复制授权码</button>
                </div>

                <div class="details-section">
                    <h3>授权码详情</h3>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="label">生成时间</div>
                            <div class="value" id="detailGenTime">-</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">类型</div>
                            <div class="value">单次使用</div>
                        </div>
                    </div>
                    <div class="remark-display" id="detailRemark" style="display:none;"></div>
                </div>

                <div class="warning-box">
                    ⚠️ 此授权码只能用于当前申请码，且仅可使用一次。
                </div>
            </div>

            <div class="error" id="error">
                <p id="errorMsg">发生错误</p>
            </div>
        </div>

        <!-- 历史页面 -->
        <div class="page" id="historyPage">
            <div class="card">
                <div class="history-header">
                    <h2>生成记录</h2>
                    <button class="clear-btn" onclick="clearAllHistory()">清空全部</button>
                </div>
                <div id="historyContent"></div>
            </div>
        </div>

        <div class="footer">
            <p>PLC Protect License Generator</p>
        </div>
    </div>

    <script>
        // Base32 编码表
        const BASE32_TABLE = "23456789ABCDEFGHJKMNPQRSTUVWXYZ0";

        // 常量
        const FILE_KEY_MIN = 100000;
        const FILE_KEY_MAX = 999999;

        // 历史记录存储键
        const HISTORY_KEY = 'plc_keygen_history';

        // 当前解析的数据
        let currentFileKey = null;
        let currentRequestHash = null;

        // ==================== 历史记录管理 ====================

        // 获取历史记录
        function getHistory() {
            try {
                const data = localStorage.getItem(HISTORY_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        // 保存历史记录
        function saveHistory(record) {
            const history = getHistory();
            history.unshift(record);
            // 最多保存100条
            if (history.length > 100) {
                history.pop();
            }
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            updateHistoryPage();
        }

        // 删除单条记录
        function deleteHistoryItem(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            updateHistoryPage();
        }

        // 清空全部历史
        function clearAllHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                updateHistoryPage();
            }
        }

        // ==================== 标签页切换 ====================

        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetPage = tab.dataset.tab;

                    // 切换标签页状态
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // 切换页面显示
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(targetPage + 'Page').classList.add('active');

                    // 切换到历史页面时刷新列表
                    if (targetPage === 'history') {
                        updateHistoryPage();
                    }
                });
            });
        }

        // ==================== 历史页面渲染 ====================

        function updateHistoryPage() {
            const container = document.getElementById('historyContent');
            const history = getHistory();

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="history-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        <p>暂无生成记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="history-list">
                    ${history.map((item, index) => {
                        return `
                        <div class="history-item">
                            <div class="key-row">
                                <span class="key-value">${item.key}</span>
                                <div class="key-actions">
                                    <button class="copy-mini-btn" onclick="copyToClipboard('${item.key}', this)">复制</button>
                                    <button class="delete-btn" onclick="deleteHistoryItem(${index})">删除</button>
                                </div>
                            </div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="label">文件Key</div>
                                    <div class="value">${item.fileKey}</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">生成时间</div>
                                    <div class="value">${formatDateTime(item.genTime)}</div>
                                </div>
                            </div>
                            ${item.remark ? `<div class="remark-text">📝 ${item.remark}</div>` : ''}
                        </div>
                    `}).join('')}
                </div>
            `;
        }

        // ==================== 工具函数 ====================

        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 1500);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = '复制';
                }, 1500);
            });
        }

        // ==================== 核心加密函数 ====================

        // 字符转索引，返回-1表示无效字符
        function charToIndex(c) {
            for (let i = 0; i < 32; i++) {
                if (BASE32_TABLE[i] === c.toUpperCase()) return i;
            }
            return -1;
        }

        // Base32 编码：70位整数 -> 14字符字符串
        function base32Encode(valueHigh, valueLow) {
            let result = '';
            // 先处理低60位（12个字符）
            for (let i = 0; i < 12; i++) {
                result = BASE32_TABLE[valueLow & 0x1Fn] + result;
                valueLow >>= 5n;
            }
            // 再处理高10位（2个字符）
            for (let i = 0; i < 2; i++) {
                result = BASE32_TABLE[valueHigh & 0x1Fn] + result;
                valueHigh >>= 5n;
            }
            return result;
        }

        // Base32 解码：10字符字符串 -> 50位整数
        function base32Decode50(str) {
            if (str.length !== 10) return null;

            let value = 0n;
            for (let i = 0; i < 10; i++) {
                const idx = charToIndex(str[i]);
                if (idx < 0) return null;
                value <<= 5n;
                value |= BigInt(idx);
            }

            return value;
        }

        // CRC-8-CCITT 计算
        function crc8(data) {
            let crc = 0x00;
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x80) {
                        crc = ((crc << 1) ^ 0x07) & 0xFF;
                    } else {
                        crc = (crc << 1) & 0xFF;
                    }
                }
            }
            return crc;
        }

        // 格式化授权码（添加连字符）
        function formatLicenseKey(key) {
            if (key.length !== 14) return key;
            return key.substring(0, 4) + '-' + key.substring(4, 8) + '-' + key.substring(8, 12) + '-' + key.substring(12, 14);
        }

        // 格式化请求密钥（添加连字符）
        function formatRequestKey(key) {
            if (key.length !== 10) return key;
            return key.substring(0, 4) + '-' + key.substring(4, 8) + '-' + key.substring(8, 10);
        }

        // 解析请求密钥输入（移除连字符，转大写）
        function parseRequestKeyInput(input) {
            let result = '';
            for (let c of input) {
                if (c === '-') continue;
                if (c >= 'a' && c <= 'z') {
                    result += c.toUpperCase();
                } else {
                    result += c;
                }
            }
            return result;
        }

        // 生成随机数（使用 Web Crypto API）
        function getRandomUint16() {
            const array = new Uint16Array(1);
            crypto.getRandomValues(array);
            return array[0];
        }

        function getRandomUint8() {
            const array = new Uint8Array(1);
            crypto.getRandomValues(array);
            return array[0];
        }

        // ==================== 请求密钥解析 ====================
        // 数据布局（50位，从高到低）：
        // [requestHash:16][fileKey:20][salt:6][checksum:8] = 50位

        function parseRequestKey(requestKeyInput) {
            const parsed = parseRequestKeyInput(requestKeyInput);
            if (parsed.length !== 10) {
                return { success: false, error: '申请码长度不正确（应为10个字符）' };
            }

            const value = base32Decode50(parsed);
            if (value === null) {
                return { success: false, error: '申请码包含无效字符' };
            }

            // 提取校验码
            const checksum = Number(value & 0xFFn);

            // 提取各字段
            const requestHash = Number((value >> 34n) & 0xFFFFn);
            const fileKey = Number((value >> 14n) & 0xFFFFFn);
            const salt = Number((value >> 8n) & 0x3Fn);

            // 验证校验码
            const dataBytes = new Uint8Array(6);
            dataBytes[0] = (requestHash >> 8) & 0xFF;
            dataBytes[1] = requestHash & 0xFF;
            dataBytes[2] = (fileKey >> 12) & 0xFF;
            dataBytes[3] = (fileKey >> 4) & 0xFF;
            dataBytes[4] = ((fileKey & 0xF) << 4) | (salt >> 2);
            dataBytes[5] = (salt & 0x3) << 6;
            const computedChecksum = crc8(dataBytes);

            if (computedChecksum !== checksum) {
                return { success: false, error: '申请码校验失败' };
            }

            if (fileKey < FILE_KEY_MIN || fileKey > FILE_KEY_MAX) {
                return { success: false, error: '申请码中的文件标识无效' };
            }

            return { success: true, fileKey: fileKey, requestHash: requestHash };
        }

        // ==================== 生成授权码 ====================
        // 数据布局（70位，从高到低）：
        // [salt_high:4][requestHash_high:6] = finalHigh (10位)
        // [requestHash_low:10][fileKey:20][padding:12][salt_low:10][checksum:8] = finalLow (60位)

        function generateKey() {
            const requestKeyInput = document.getElementById('requestKey');
            const remarkInput = document.getElementById('remark');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            // 隐藏之前的结果
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');

            // 解析申请码
            const requestKey = requestKeyInput.value.trim();
            if (!requestKey) {
                showError('请输入申请码');
                return;
            }

            const parseResult = parseRequestKey(requestKey);
            if (!parseResult.success) {
                showError(parseResult.error);
                return;
            }

            const fileKey = parseResult.fileKey;
            const requestHash = parseResult.requestHash;
            const remark = remarkInput.value.trim();

            const genTime = Date.now();

            // 生成随机盐（14位）和填充（12位）
            const saltValue = getRandomUint16() & 0x3FFF;  // 14位
            const padding = getRandomUint16() & 0x0FFF;    // 12位

            // 数据布局（70位，从高到低）：
            // [salt_high:4][requestHash_high:6] = finalHigh (10位)
            // [requestHash_low:10][fileKey:20][padding:12][salt_low:10][checksum:8] = finalLow (60位)

            const finalHigh = ((BigInt(saltValue >> 10) << 6n) | (BigInt(requestHash) >> 10n)) & 0x3FFn;

            const finalLow = ((BigInt(requestHash) & 0x3FFn) << 50n) |  // requestHash低10位
                             (BigInt(fileKey) << 30n) |                 // fileKey 20位
                             (BigInt(padding) << 18n) |                 // padding 12位
                             ((BigInt(saltValue) & 0x3FFn) << 8n);      // salt低10位

            // 计算校验码（对62位数据计算：finalHigh + finalLow高52位）
            const packed = (finalHigh << 52n) | (finalLow >> 8n);
            const dataBytes = new Uint8Array(8);
            dataBytes[0] = Number((packed >> 56n) & 0xFFn);
            dataBytes[1] = Number((packed >> 48n) & 0xFFn);
            dataBytes[2] = Number((packed >> 40n) & 0xFFn);
            dataBytes[3] = Number((packed >> 32n) & 0xFFn);
            dataBytes[4] = Number((packed >> 24n) & 0xFFn);
            dataBytes[5] = Number((packed >> 16n) & 0xFFn);
            dataBytes[6] = Number((packed >> 8n) & 0xFFn);
            dataBytes[7] = Number(packed & 0xFFn);
            const checksum = crc8(dataBytes);

            const finalLowWithChecksum = finalLow | BigInt(checksum);

            // 转换为 Base32 字符
            const key = base32Encode(finalHigh, finalLowWithChecksum);
            const formattedKey = formatLicenseKey(key);

            // 显示结果
            document.getElementById('resultFileKey').textContent = fileKey;
            document.getElementById('resultRequestHash').textContent = requestHash;
            document.getElementById('resultKey').textContent = formattedKey;

            // 显示详情
            document.getElementById('detailGenTime').textContent = formatDateTime(genTime);

            // 显示备注
            const remarkDisplay = document.getElementById('detailRemark');
            if (remark) {
                remarkDisplay.textContent = '📝 ' + remark;
                remarkDisplay.style.display = 'block';
            } else {
                remarkDisplay.style.display = 'none';
            }

            // 保存历史记录
            saveHistory({
                key: formattedKey,
                fileKey: fileKey,
                requestHash: requestHash,
                genTime: genTime,
                remark: remark
            });

            resultDiv.classList.add('show');

            // 滚动到结果区域
            setTimeout(() => {
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // 显示错误
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            document.getElementById('errorMsg').textContent = msg;
            errorDiv.classList.add('show');

            // 滚动到错误区域
            setTimeout(() => {
                errorDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // 复制密钥
        function copyKey() {
            const keyText = document.getElementById('resultKey').textContent;
            const btn = document.querySelector('.copy-btn');
            copyToClipboard(keyText, btn);
            btn.classList.add('copied');
            setTimeout(() => btn.classList.remove('copied'), 2000);
        }

        // ==================== 初始化 ====================

        function init() {
            initTabs();

            // 申请码输入框事件
            const requestKeyInput = document.getElementById('requestKey');
            const fileKeyDisplay = document.getElementById('fileKeyDisplay');
            const parsedFileKey = document.getElementById('parsedFileKey');
            const parsedRequestHash = document.getElementById('parsedRequestHash');

            requestKeyInput.addEventListener('input', () => {
                const value = requestKeyInput.value.trim();
                if (value.length >= 10) {
                    const parseResult = parseRequestKey(value);
                    if (parseResult.success) {
                        parsedFileKey.textContent = parseResult.fileKey;
                        parsedRequestHash.textContent = parseResult.requestHash;
                        fileKeyDisplay.classList.add('show');
                        currentFileKey = parseResult.fileKey;
                        currentRequestHash = parseResult.requestHash;
                    } else {
                        fileKeyDisplay.classList.remove('show');
                        currentFileKey = null;
                        currentRequestHash = null;
                    }
                } else {
                    fileKeyDisplay.classList.remove('show');
                    currentFileKey = null;
                    currentRequestHash = null;
                }
            });

            // 回车键触发生成
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    generateKey();
                }
            });

            // 初始化历史页面
            updateHistoryPage();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
