<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PLC 授权码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-top: 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #4fc3f7;
        }

        .header p {
            font-size: 14px;
            color: #aaa;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #888;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
        }

        .tab:hover:not(.active) {
            color: #fff;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #b0bec5;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            transition: border-color 0.3s, box-shadow 0.3s;
            -webkit-appearance: none;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group .hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
        }

        .file-key-display {
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(79, 195, 247, 0.1);
            border: 1px solid rgba(79, 195, 247, 0.3);
            border-radius: 8px;
            display: none;
        }

        .file-key-display.show {
            display: block;
        }

        .file-key-display .label {
            font-size: 12px;
            color: #4fc3f7;
        }

        .file-key-display .value {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-top: 4px;
        }

        .preset-group {
            margin-top: 12px;
        }

        .preset-group label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 8px;
        }

        .preset-buttons {
            display: flex;
            gap: 8px;
        }

        .preset-btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #b0bec5;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: #4fc3f7;
            color: #fff;
        }

        .preset-btn.active {
            background: rgba(79, 195, 247, 0.3);
            border-color: #4fc3f7;
            color: #4fc3f7;
        }

        .remark-group {
            margin-top: 16px;
            margin-bottom: 20px;
        }

        .remark-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #b0bec5;
        }

        .remark-group textarea {
            width: 100%;
            padding: 14px 16px;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            resize: none;
            height: 60px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .remark-group textarea:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.2);
        }

        .remark-group textarea::placeholder {
            color: #666;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 195, 247, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            border-radius: 16px;
            padding: 24px;
            margin-top: 20px;
        }

        .result.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #a5d6a7;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .result-item .label {
            font-size: 14px;
            color: #a5d6a7;
        }

        .result-item .value {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .key-display {
            margin-top: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            text-align: center;
        }

        .key-display .key {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .key-display .copy-btn {
            margin-top: 12px;
            padding: 10px 24px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .key-display .copy-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .key-display .copy-btn.copied {
            background: #4caf50;
        }

        .details-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .details-section h3 {
            font-size: 14px;
            color: #a5d6a7;
            margin-bottom: 12px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 12px;
            border-radius: 8px;
        }

        .detail-item .label {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
        }

        .detail-item .value {
            font-size: 13px;
            color: #fff;
        }

        .remark-display {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            font-size: 13px;
            color: #b0bec5;
        }

        .error {
            display: none;
            background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .error.show {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        .error p {
            font-size: 14px;
            color: #ffcdd2;
        }

        /* 历史页面样式 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .history-header h2 {
            font-size: 18px;
            color: #4fc3f7;
        }

        .clear-btn {
            padding: 8px 16px;
            font-size: 13px;
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            color: #f44336;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(244, 67, 54, 0.3);
        }

        .clean-btn {
            padding: 8px 16px;
            font-size: 13px;
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 8px;
            color: #ff9800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clean-btn:hover {
            background: rgba(255, 152, 0, 0.3);
        }

        .history-actions {
            display: flex;
            gap: 8px;
        }

        .history-empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .history-empty svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .history-item:hover {
            border-color: rgba(79, 195, 247, 0.3);
        }

        .history-item .key-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 8px;
        }

        .history-item .key-value {
            font-size: 16px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #4fc3f7;
            letter-spacing: 1px;
            flex: 1;
            word-break: break-all;
        }

        .history-item .key-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .history-item .copy-mini-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item .copy-mini-btn:hover {
            background: rgba(79, 195, 247, 0.3);
        }

        .history-item .delete-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(244, 67, 54, 0.2);
            border: none;
            border-radius: 6px;
            color: #f44336;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item .delete-btn:hover {
            background: rgba(244, 67, 54, 0.4);
        }

        .history-item .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .history-item .info-item {
            text-align: center;
        }

        .history-item .info-item .label {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
        }

        .history-item .info-item .value {
            font-size: 13px;
            color: #fff;
        }

        .history-item .remark-text {
            font-size: 12px;
            color: #888;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-bottom: 20px;
        }

        .footer p {
            font-size: 12px;
            color: #666;
        }

        @media (max-width: 400px) {
            .preset-buttons {
                flex-wrap: wrap;
            }
            .preset-btn {
                flex: 1 1 calc(50% - 4px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PLC 授权码生成器</h1>
            <p>根据申请码生成授权密钥</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="generator">生成授权码</div>
            <div class="tab" data-tab="history">历史记录</div>
        </div>

        <!-- 生成页面 -->
        <div class="page active" id="generatorPage">
            <div class="card">
                <div class="form-group">
                    <label for="requestKey">申请码</label>
                    <div class="input-wrapper">
                        <input type="text" id="requestKey" placeholder="输入申请码（如：ABCD-EFGH-IJ）" autocomplete="off" style="text-transform: uppercase;">
                    </div>
                    <p class="hint">由 PRO 程序生成，包含加密的文件标识</p>
                    <div class="file-key-display" id="fileKeyDisplay">
                        <div class="label">解析到的文件标识</div>
                        <div class="value" id="parsedFileKey">-</div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="validMinutes">有效分钟数</label>
                    <div class="input-wrapper">
                        <input type="number" id="validMinutes" placeholder="输入有效分钟数" min="1" max="1440" autocomplete="off">
                    </div>
                    <p class="hint">范围：1 - 1440 分钟（最大24小时）</p>

                    <div class="preset-group">
                        <label>快捷预设</label>
                        <div class="preset-buttons">
                            <button class="preset-btn" data-minutes="5">5分钟</button>
                            <button class="preset-btn" data-minutes="10">10分钟</button>
                            <button class="preset-btn" data-minutes="30">30分钟</button>
                            <button class="preset-btn" data-minutes="60">60分钟</button>
                        </div>
                    </div>
                </div>

                <div class="remark-group">
                    <label for="remark">备注（可选）</label>
                    <textarea id="remark" placeholder="输入备注信息。"></textarea>
                </div>

                <button class="btn btn-primary" onclick="generateKey()">生成授权码</button>
            </div>

            <div class="result" id="result">
                <h2>✓ 生成成功</h2>
                <div class="result-item">
                    <span class="label">文件 Key</span>
                    <span class="value" id="resultFileKey">-</span>
                </div>
                <div class="result-item">
                    <span class="label">有效分钟数</span>
                    <span class="value" id="resultValidMinutes">-</span>
                </div>
                <div class="result-item">
                    <span class="label">到期时间</span>
                    <span class="value" id="resultExpireDate">-</span>
                </div>
                <div class="key-display">
                    <div class="key" id="resultKey">-</div>
                    <button class="copy-btn" onclick="copyKey()">复制授权码</button>
                </div>

                <div class="details-section">
                    <h3>授权码详情</h3>
                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="label">生成时间</div>
                            <div class="value" id="detailGenTime">-</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">起始时间</div>
                            <div class="value" id="detailStartDate">-</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">到期时间</div>
                            <div class="value" id="detailEndDate">-</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">有效期</div>
                            <div class="value" id="detailPeriod">-</div>
                        </div>
                    </div>
                    <div class="remark-display" id="detailRemark" style="display:none;"></div>
                </div>
            </div>

            <div class="error" id="error">
                <p id="errorMsg">发生错误</p>
            </div>
        </div>

        <!-- 历史页面 -->
        <div class="page" id="historyPage">
            <div class="card">
                <div class="history-header">
                    <h2>生成记录</h2>
                    <div class="history-actions">
                        <button class="clean-btn" onclick="cleanExpiredKeys()">清除失效</button>
                        <button class="clear-btn" onclick="clearAllHistory()">清空全部</button>
                    </div>
                </div>
                <div id="historyContent"></div>
            </div>
        </div>

        <div class="footer">
            <p>PLC Protect License Generator</p>
        </div>
    </div>

    <script>
        // Base32 编码表
        const BASE32_TABLE = "23456789ABCDEFGHJKMNPQRSTUVWXYZ0";

        // 基准时间戳：2020-01-01 00:00:00 UTC
        const BASE_TIMESTAMP = 1577836800;

        // 常量
        const FILE_KEY_MIN = 100000;
        const FILE_KEY_MAX = 999999;
        const VALID_MINUTES_MIN = 1;
        const VALID_MINUTES_MAX = 1440;  // 最大24小时

        // 历史记录存储键
        const HISTORY_KEY = 'plc_keygen_history';

        // 当前解析的 fileKey
        let currentFileKey = null;

        // ==================== 历史记录管理 ====================

        // 获取历史记录
        function getHistory() {
            try {
                const data = localStorage.getItem(HISTORY_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                return [];
            }
        }

        // 保存历史记录
        function saveHistory(record) {
            const history = getHistory();
            history.unshift(record);
            // 最多保存100条
            if (history.length > 100) {
                history.pop();
            }
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            updateHistoryPage();
        }

        // 删除单条记录
        function deleteHistoryItem(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            updateHistoryPage();
        }

        // 清空全部历史
        function clearAllHistory() {
            if (confirm('确定要清空所有历史记录吗？')) {
                localStorage.removeItem(HISTORY_KEY);
                updateHistoryPage();
            }
        }

        // 清除失效的key
        function cleanExpiredKeys() {
            const history = getHistory();
            const currentMinuteOffset = getCurrentMinuteOffset();

            const validHistory = history.filter(item => {
                // 优先使用保存的 startOffset，兼容旧记录使用 genTime 反推
                let startOffset = item.startOffset;
                if (startOffset === undefined) {
                    startOffset = Math.floor((item.genTime / 1000 - BASE_TIMESTAMP) / 60);
                }
                // 获取有效分钟数（兼容旧记录的 validDays）
                const validMinutes = item.validMinutes || (item.validDays ? item.validDays * 1440 : 0);
                if (validMinutes === 0) return false;
                // 计算到期时间偏移
                const expireMinuteOffset = startOffset + validMinutes;
                // 如果当前时间小于到期时间，则仍然有效
                return currentMinuteOffset < expireMinuteOffset;
            });

            const removedCount = history.length - validHistory.length;
            if (removedCount === 0) {
                alert('没有失效的密钥');
                return;
            }

            if (confirm(`确定要清除 ${removedCount} 条失效记录吗？`)) {
                localStorage.setItem(HISTORY_KEY, JSON.stringify(validHistory));
                updateHistoryPage();
            }
        }

        // ==================== 标签页切换 ====================

        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetPage = tab.dataset.tab;

                    // 切换标签页状态
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // 切换页面显示
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    document.getElementById(targetPage + 'Page').classList.add('active');

                    // 切换到历史页面时刷新列表
                    if (targetPage === 'history') {
                        updateHistoryPage();
                    }
                });
            });
        }

        // ==================== 快捷预设 ====================

        function initPresets() {
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById('validMinutes').value = btn.dataset.minutes;
                });
            });
        }

        // ==================== 历史页面渲染 ====================

        function updateHistoryPage() {
            const container = document.getElementById('historyContent');
            const history = getHistory();

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="history-empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 6v6l4 2"/>
                        </svg>
                        <p>暂无生成记录</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="history-list">
                    ${history.map((item, index) => {
                        const validMinutes = item.validMinutes || (item.validDays ? item.validDays * 1440 : 0);
                        return `
                        <div class="history-item">
                            <div class="key-row">
                                <span class="key-value">${item.key}</span>
                                <div class="key-actions">
                                    <button class="copy-mini-btn" onclick="copyToClipboard('${item.key}', this)">复制</button>
                                    <button class="delete-btn" onclick="deleteHistoryItem(${index})">删除</button>
                                </div>
                            </div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <div class="label">文件Key</div>
                                    <div class="value">${item.fileKey}</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">有效分钟</div>
                                    <div class="value">${validMinutes}分钟</div>
                                </div>
                                <div class="info-item">
                                    <div class="label">生成时间</div>
                                    <div class="value">${formatDateTime(item.genTime)}</div>
                                </div>
                            </div>
                            ${item.remark ? `<div class="remark-text">📝 ${item.remark}</div>` : ''}
                        </div>
                    `}).join('')}
                </div>
            `;
        }

        // ==================== 工具函数 ====================

        function formatDateTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleDateString('zh-CN');
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 1500);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = '已复制';
                setTimeout(() => {
                    btn.textContent = '复制';
                }, 1500);
            });
        }

        // ==================== 核心加密函数 ====================

        // 字符转索引，返回-1表示无效字符
        function charToIndex(c) {
            for (let i = 0; i < 32; i++) {
                if (BASE32_TABLE[i] === c.toUpperCase()) return i;
            }
            return -1;
        }

        // Base32 编码：70位整数 -> 14字符字符串
        function base32Encode(valueHigh, valueLow) {
            let result = '';
            // 先处理低60位（12个字符）
            for (let i = 0; i < 12; i++) {
                result = BASE32_TABLE[valueLow & 0x1Fn] + result;
                valueLow >>= 5n;
            }
            // 再处理高10位（2个字符）
            for (let i = 0; i < 2; i++) {
                result = BASE32_TABLE[valueHigh & 0x1Fn] + result;
                valueHigh >>= 5n;
            }
            return result;
        }

        // Base32 解码：10字符字符串 -> 50位整数
        function base32Decode50(str) {
            if (str.length !== 10) return null;

            let value = 0n;
            for (let i = 0; i < 10; i++) {
                const idx = charToIndex(str[i]);
                if (idx < 0) return null;
                value <<= 5n;
                value |= BigInt(idx);
            }

            return value;
        }

        // CRC-8-CCITT 计算
        function crc8(data) {
            let crc = 0x00;
            for (let i = 0; i < data.length; i++) {
                crc ^= data[i];
                for (let j = 0; j < 8; j++) {
                    if (crc & 0x80) {
                        crc = ((crc << 1) ^ 0x07) & 0xFF;
                    } else {
                        crc = (crc << 1) & 0xFF;
                    }
                }
            }
            return crc;
        }

        // 62位数据打包为8字节（大端序）
        function packDataToBytes(dataHigh, dataLow) {
            const bytes = new Uint8Array(8);
            bytes[0] = Number(((dataHigh << 6n) | (dataLow >> 54n)) & 0xFFn);
            bytes[1] = Number((dataLow >> 46n) & 0xFFn);
            bytes[2] = Number((dataLow >> 38n) & 0xFFn);
            bytes[3] = Number((dataLow >> 30n) & 0xFFn);
            bytes[4] = Number((dataLow >> 22n) & 0xFFn);
            bytes[5] = Number((dataLow >> 14n) & 0xFFn);
            bytes[6] = Number((dataLow >> 6n) & 0xFFn);
            bytes[7] = Number((dataLow << 2n) & 0xFCn);
            return bytes;
        }

        // 从 salt 生成 56 位 XOR 掩码
        function generateXorMask(salt) {
            const s = BigInt(salt);
            let mask = (s << 50n) | (s << 44n) | (s << 38n) | (s << 32n) |
                       (s << 26n) | (s << 20n) | (s << 14n) | (s << 8n) |
                       (s << 2n) | s;
            mask ^= 0x5AA5A55AA5A5A55An;
            return mask & 0xFFFFFFFFFFFFFFn;  // 取 56 位
        }

        // 从 xorSalt 生成 36 位 XOR 掩码（用于请求密钥）
        function generateRequestXorMask(xorSalt) {
            const s = BigInt(xorSalt);
            let mask = (s << 30n) | (s << 24n) | (s << 18n) | (s << 12n) | (s << 6n) | s;
            mask ^= 0x5AA5A55AA5A5A5A5n;
            return mask & 0xFFFFFFFFFn;  // 取 36 位
        }

        // 获取当前UTC分钟偏移
        function getCurrentMinuteOffset() {
            const now = Math.floor(Date.now() / 1000);
            return Math.floor((now - BASE_TIMESTAMP) / 60);
        }

        // 格式化授权码（添加连字符）
        function formatLicenseKey(key) {
            if (key.length !== 14) return key;
            return key.substring(0, 4) + '-' + key.substring(4, 8) + '-' + key.substring(8, 12) + '-' + key.substring(12, 14);
        }

        // 格式化请求密钥（添加连字符）
        function formatRequestKey(key) {
            if (key.length !== 10) return key;
            return key.substring(0, 4) + '-' + key.substring(4, 8) + '-' + key.substring(8, 10);
        }

        // 解析请求密钥输入（移除连字符，转大写）
        function parseRequestKeyInput(input) {
            let result = '';
            for (let c of input) {
                if (c === '-') continue;
                if (c >= 'a' && c <= 'z') {
                    result += c.toUpperCase();
                } else {
                    result += c;
                }
            }
            return result;
        }

        // 生成随机盐（6位）
        function generateSalt() {
            const array = new Uint8Array(4);
            crypto.getRandomValues(array);
            const randomValue = (array[0] << 24) | (array[1] << 16) | (array[2] << 8) | array[3];
            return randomValue & 0x3F;
        }

        // 计算到期日期时间
        function calculateExpireDateTime(startOffset, validMinutes) {
            const expireTimestamp = BASE_TIMESTAMP + (startOffset + validMinutes) * 60;
            const date = new Date(expireTimestamp * 1000);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // 计算起始日期时间
        function calculateStartDateTime(startOffset) {
            const startTimestamp = BASE_TIMESTAMP + startOffset * 60;
            const date = new Date(startTimestamp * 1000);
            return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        }

        // ==================== 请求密钥解析 ====================

        function parseRequestKey(requestKeyInput) {
            const parsed = parseRequestKeyInput(requestKeyInput);
            if (parsed.length !== 10) {
                return { success: false, error: '申请码长度不正确（应为10个字符）' };
            }

            const value = base32Decode50(parsed);
            if (value === null) {
                return { success: false, error: '申请码包含无效字符' };
            }

            // 提取校验码
            const checksum = Number(value & 0xFFn);

            // 提取 xorSalt 和 obfuscatedData（使用 BigInt 避免精度丢失）
            const xorSalt = Number((value >> 44n) & 0x3Fn);
            const obfuscatedDataBig = (value >> 8n) & 0xFFFFFFFFFn;

            // 验证校验码（使用 BigInt 计算）
            const dataBytes = new Uint8Array(6);
            dataBytes[0] = Number(((BigInt(xorSalt) << 2n) | (obfuscatedDataBig >> 34n)) & 0xFFn);
            dataBytes[1] = Number((obfuscatedDataBig >> 26n) & 0xFFn);
            dataBytes[2] = Number((obfuscatedDataBig >> 18n) & 0xFFn);
            dataBytes[3] = Number((obfuscatedDataBig >> 10n) & 0xFFn);
            dataBytes[4] = Number((obfuscatedDataBig >> 2n) & 0xFFn);
            dataBytes[5] = Number((obfuscatedDataBig << 6n) & 0xFFn);
            const computedChecksum = crc8(dataBytes);

            if (computedChecksum !== checksum) {
                return { success: false, error: '申请码校验失败' };
            }

            // 还原原始数据
            const xorMask = generateRequestXorMask(xorSalt);
            const rawData = obfuscatedDataBig ^ xorMask;

            // 提取 fileKey
            const fileKey = Number(rawData & 0xFFFFFn);
            if (fileKey < FILE_KEY_MIN || fileKey > FILE_KEY_MAX) {
                return { success: false, error: '申请码中的文件标识无效' };
            }

            return { success: true, fileKey: fileKey };
        }

        // ==================== 生成授权码 ====================

        function generateKey() {
            const requestKeyInput = document.getElementById('requestKey');
            const validMinutesInput = document.getElementById('validMinutes');
            const remarkInput = document.getElementById('remark');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            // 隐藏之前的结果
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');

            // 解析申请码
            const requestKey = requestKeyInput.value.trim();
            if (!requestKey) {
                showError('请输入申请码');
                return;
            }

            const parseResult = parseRequestKey(requestKey);
            if (!parseResult.success) {
                showError(parseResult.error);
                return;
            }

            const fileKey = parseResult.fileKey;

            // 获取有效分钟数
            const validMinutes = parseInt(validMinutesInput.value);
            const remark = remarkInput.value.trim();

            // 验证有效分钟数
            if (isNaN(validMinutes) || validMinutes < VALID_MINUTES_MIN || validMinutes > VALID_MINUTES_MAX) {
                showError('有效分钟数必须在 1-1440 之间（最大24小时）');
                return;
            }

            // 获取当前分钟偏移
            const minutesOffset = getCurrentMinuteOffset();
            const genTime = Date.now();

            // 生成随机盐
            const salt = generateSalt();

            // 组合原始数据位（56位）：[start_offset:24][valid_minutes:12][file_key:20]
            const rawData = (BigInt(minutesOffset) << 32n) |
                            (BigInt(validMinutes) << 20n) |
                            BigInt(fileKey);

            // 使用 salt 生成 XOR 掩码并混淆数据
            const xorMask = generateXorMask(salt);
            const obfuscatedData = rawData ^ xorMask;

            // 数据布局（70位）：[salt:6][obfuscatedData:56][checksum:8]
            const finalHigh = (BigInt(salt) << 4n) | (obfuscatedData >> 52n);
            const finalLow_without_checksum = obfuscatedData & 0xFFFFFFFFFFFFFn;  // 低52位

            // 计算校验码（对62位数据计算）
            const packed = (finalHigh << 52n) | finalLow_without_checksum;
            const dataBytes = new Uint8Array(8);
            dataBytes[0] = Number((packed >> 56n) & 0xFFn);
            dataBytes[1] = Number((packed >> 48n) & 0xFFn);
            dataBytes[2] = Number((packed >> 40n) & 0xFFn);
            dataBytes[3] = Number((packed >> 32n) & 0xFFn);
            dataBytes[4] = Number((packed >> 24n) & 0xFFn);
            dataBytes[5] = Number((packed >> 16n) & 0xFFn);
            dataBytes[6] = Number((packed >> 8n) & 0xFFn);
            dataBytes[7] = Number(packed & 0xFFn);
            const checksum = crc8(dataBytes);

            // 合并最终数据（70位）
            const finalLow = (finalLow_without_checksum << 8n) | BigInt(checksum);

            // 转换为 Base32 字符
            const key = base32Encode(finalHigh, finalLow);
            const formattedKey = formatLicenseKey(key);

            // 显示结果
            document.getElementById('resultFileKey').textContent = fileKey;
            document.getElementById('resultValidMinutes').textContent = validMinutes + ' 分钟';
            document.getElementById('resultExpireDate').textContent = calculateExpireDateTime(minutesOffset, validMinutes);
            document.getElementById('resultKey').textContent = formattedKey;

            // 显示详情
            document.getElementById('detailGenTime').textContent = formatDateTime(genTime);
            document.getElementById('detailStartDate').textContent = calculateStartDateTime(minutesOffset);
            document.getElementById('detailEndDate').textContent = calculateExpireDateTime(minutesOffset, validMinutes);
            document.getElementById('detailPeriod').textContent = validMinutes + ' 分钟';

            // 显示备注
            const remarkDisplay = document.getElementById('detailRemark');
            if (remark) {
                remarkDisplay.textContent = '📝 ' + remark;
                remarkDisplay.style.display = 'block';
            } else {
                remarkDisplay.style.display = 'none';
            }

            // 保存历史记录
            saveHistory({
                key: formattedKey,
                fileKey: fileKey,
                validMinutes: validMinutes,
                genTime: genTime,
                startOffset: minutesOffset,
                remark: remark
            });

            resultDiv.classList.add('show');

            // 滚动到结果区域
            setTimeout(() => {
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // 显示错误
        function showError(msg) {
            const errorDiv = document.getElementById('error');
            document.getElementById('errorMsg').textContent = msg;
            errorDiv.classList.add('show');

            // 滚动到错误区域
            setTimeout(() => {
                errorDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        // 复制密钥
        function copyKey() {
            const keyText = document.getElementById('resultKey').textContent;
            const btn = document.querySelector('.copy-btn');
            copyToClipboard(keyText, btn);
            btn.classList.add('copied');
            setTimeout(() => btn.classList.remove('copied'), 2000);
        }

        // ==================== 初始化 ====================

        function init() {
            initTabs();
            initPresets();

            // 申请码输入框事件
            const requestKeyInput = document.getElementById('requestKey');
            const fileKeyDisplay = document.getElementById('fileKeyDisplay');
            const parsedFileKey = document.getElementById('parsedFileKey');

            requestKeyInput.addEventListener('input', () => {
                const value = requestKeyInput.value.trim();
                if (value.length >= 10) {
                    const parseResult = parseRequestKey(value);
                    if (parseResult.success) {
                        parsedFileKey.textContent = parseResult.fileKey;
                        fileKeyDisplay.classList.add('show');
                        currentFileKey = parseResult.fileKey;
                    } else {
                        fileKeyDisplay.classList.remove('show');
                        currentFileKey = null;
                    }
                } else {
                    fileKeyDisplay.classList.remove('show');
                    currentFileKey = null;
                }
            });

            // 回车键触发生成
            document.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    generateKey();
                }
            });

            // 初始化历史页面
            updateHistoryPage();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
